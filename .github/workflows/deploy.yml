name: deploy
# Bei jedem Push auf main den Easypanel-Deploy der Dashboard-App auslösen.
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Easypanel deploy
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${{ secrets.EASYPANEL_HOOK }}")
          echo "Easypanel deploy hook -> HTTP $code"
          if [ "$code" != "200" ]; then echo "::warning::Easypanel-Hook lieferte HTTP $code — Secret EASYPANEL_HOOK evtl. veraltet (Service neu konfiguriert). Deploy bitte manuell ausloesen oder Hook-URL aktualisieren."; fi
